# .github/workflows/deploy.yml
# Automatically builds and deploys the React frontend to GitHub Pages
# every time you push code to the main branch

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # Allows manual trigger from GitHub Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Download your code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install packages
        run: npm install
        working-directory: ./frontend

      - name: Create .env with production API URL
        # VITE_API_URL is set in GitHub repo Settings > Secrets
        run: echo "VITE_API_URL=${{ secrets.VITE_API_URL }}" > .env
        working-directory: ./frontend

      - name: Build React app
        run: npm run build
        working-directory: ./frontend

      - name: Upload build output
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend/dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
